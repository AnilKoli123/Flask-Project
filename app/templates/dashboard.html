{% extends 'base.html' %}
{% block content %}

<h2>Dashboard</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card bg-primary text-white p-3 shadow">
            <h5>Students</h5>
            <h2>{{ students }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-success text-white p-3 shadow">
            <h5>Subjects</h5>
            <h2>{{ subjects }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-warning text-white p-3 shadow">
            <h5>Attendance</h5>
            <h2>{{ attendance }}</h2>
        </div>
    </div>
</div>

{% endblock %}
