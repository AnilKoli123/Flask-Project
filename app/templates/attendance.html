{% extends 'base.html' %}
{% block content %}
<h2>Attendance</h2>

<form method="POST">
<select name="subject" class="form-control">
{% for sub in subjects %}
<option value="{{ sub.id }}">{{ sub.name }}</option>
{% endfor %}
</select>

{% for s in students %}
<div>
{{ s.name }}
<select name="{{ s.id }}">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>
</div>
{% endfor %}

<button class="btn btn-primary mt-3">Submit</button>
</form>
{% endblock %}
